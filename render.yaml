# Render Blueprint: hosts the Python compute engine (FastAPI + volcontrol).
# Deploy: https://dashboard.render.com → New → Blueprint → dieses Repo wählen.
# Danach die Render-URL als ENGINE_URL im Vercel-Projekt eintragen.
services:
  - type: web
    name: treasury-volcontrol-engine
    runtime: python
    plan: free
    rootDir: engine
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
